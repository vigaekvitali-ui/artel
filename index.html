<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АРТЕЛЬ 2026</title>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg: #f1f5f9; --paper: #ffffff; --primary: #2563eb; --text: #1e293b; --border: #cbd5e1; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; font-size: 13px; display: flex; justify-content: center; }
        
        /* Фикс ширины для десктопа: 650px максимум */
        .app-container { width: 100%; max-width: 650px; background: var(--paper); min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }

        header { background: var(--paper); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        
        .page { display: none; padding: 10px; }
        .active { display: block !important; }
        
        .card { background: var(--paper); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
        
        /* Кнопки в две колонки, чтобы не тянулись */
        .grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .span-2 { grid-column: span 2; }

        .res-btn { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: white; font-size: 0.75rem; font-weight: bold; }
        
        .google-form { display: flex; gap: 5px; margin-bottom: 10px; }
        .google-input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        .google-btn { background: #4285f4; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 650px; background: white; display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); border-top: 1px solid var(--border); height: 55px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; background: #f8fafc; }

        .hero-block { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        .mini-calendar { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 4px; width: 130px; font-size: 0.55rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
        .cal-today { background: var(--primary); color: white; border-radius: 2px; }
        .fact-box { background: #eff6ff; border: 1px dashed var(--primary); border-radius: 6px; padding: 6px; font-size: 0.7rem; flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-style: italic; }
        
        .group-tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 8px; padding-bottom: 5px; }
        .group-btn { padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 6px; font-size: 0.65rem; font-weight: bold; white-space: nowrap; }
        .active-group-btn { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
    </style>
</head>
<body x-data="artel" x-init="init()" x-cloak>

<div class="app-container">
    <header>
        <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem;">АРТЕЛЬ</div>
        <div style="font-size: 0.65rem; font-weight: bold; color: #64748b;" x-text="rank"></div>
    </header>

    <div class="page" :class="{ 'active': tab === 1 }">
        <div class="hero-block">
            <div class="fact-box" x-text="fact"></div>
            <div class="mini-calendar">
                <div style="text-align: center; font-weight: bold; margin-bottom: 2px; text-transform: uppercase;" x-text="month"></div>
                <div class="cal-grid">
                    <template x-for="h in ['П','В','С','Ч','П','С','В']"><div style="font-weight:bold;color:#94a3b8" x-text="h"></div></template>
                    <template x-for="b in blanks"><div></div></template>
                    <template x-for="d in days"><div :class="isToday(d) ? 'cal-today' : ''" x-text="d"></div></template>
                </div>
            </div>
        </div>
        
        <form action="https://www.google.com/search" method="get" target="_blank" class="google-form">
            <input type="text" name="q" class="google-input" placeholder="Поиск в Google...">
            <button type="submit" class="google-btn">🔎</button>
        </form>

        <div class="grid-box">
            <a href="https://ogaek.by" target="_blank" class="res-btn span-2" style="background:#fffbeb; justify-content:center">🏫 ОГАЭК</a>
            <a href="https://cyberleninka.ru" target="_blank" class="res-btn">📖 Ленинка</a>
            <a href="https://scholar.google.com" target="_blank" class="res-btn">🎓 Академия</a>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <a href="#" class="res-btn" style="border-left:5px solid #22c55e">🚗 АВТО / ГСМ</a>
            <a href="#" class="res-btn" style="border-left:5px solid #f59e0b">🚜 ТРАКТОРЫ</a>
            <a href="#" class="res-btn" style="border-left:5px solid #3b82f6">⚙️ С/Х МАШИНЫ</a>
        </div>
    </div>

    <div class="page" :class="{ 'active': tab === 4 }">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
            <h3 style="margin:0">📋 Группы</h3>
            <button @click="addGroup()" x-show="rank !== 'Студент'" style="background:#22c55e; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:0.6rem">+ ГРУППА</button>
        </div>
        <div class="group-tabs">
            <template x-for="g in groups_list"><button @click="activeGroup = g" :class="activeGroup === g ? 'active-group-btn' : 'group-btn'" x-text="g"></button></template>
        </div>
        <template x-if="rank !== 'Студент'">
            <div class="card" style="display:flex; gap:5px; background:#f8fafc">
                <input type="text" x-model="newTask" @keydown.enter="addTask()" placeholder="Запись..." style="flex:1; padding:8px; border:1px solid var(--border); border-radius:6px;">
                <button @click="addTask()" class="google-btn">ОК</button>
            </div>
        </template>
        <div style="margin-top:10px">
            <template x-for="task in (tasks_data[activeGroup] || [])" :key="task.id">
                <div class="card" style="display:flex; justify-content:space-between; padding:8px;">
                    <div><div style="font-weight:bold" x-text="task.text"></div><div style="font-size:0.55rem; color:#94a3b8" x-text="task.time"></div></div>
                    <button @click="removeTask(task.id)" x-show="rank !== 'Студент'" style="color:#ef4444; border:none; background:none;">&times;</button>
                </div>
            </template>
        </div>
    </div>

    <div class="page" :class="{ 'active': tab === 7 }">
        <template x-if="rank === 'Мастодонт' || rank === 'Админ'">
            <div>
                <h4 style="margin:0 0 10px">☕ ПЕРЕМЕНКА</h4>
                <div class="grid-box">
                    <a href="https://radiopotok.ru/belarus" target="_blank" class="res-btn">🇧🇾 Радио</a>
                    <a href="https://youtube.com" target="_blank" class="res-btn">🎬 YouTube</a>
                </div>
                <div class="card" style="margin-top:15px; border:2px solid var(--primary)">
                    <b>💬 ЛОГ:</b>
                    <div style="display:flex; gap:5px; margin:8px 0">
                        <input type="text" x-model="chatMsg" class="google-input" placeholder="...">
                        <button @click="addChatMessage()" class="google-btn">💾</button>
                    </div>
                    <div style="max-height:120px; overflow-y:auto; font-size:0.7rem">
                        <template x-for="m in chat_history"><div style="padding:3px; border-bottom:1px solid #eee" x-text="m.text"></div></template>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div class="page" :class="{ 'active': tab === 8 }">
        <template x-if="rank === 'Студент'">
            <div class="card" style="text-align:center">
                <input type="password" x-model="pass" @keydown.enter="login()" placeholder="КОД" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; text-align:center; margin-bottom:10px">
                <button @click="login()" class="google-btn" style="width:100%; padding:10px">ВОЙТИ</button>
            </div>
        </template>
        <template x-if="rank !== 'Студент'">
            <div class="card" style="text-align:center">
                <p>Ранг: <b x-text="rank"></b></p>
                <button @click="logout()" style="width:100%; background:#ef4444; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold">ВЫЙТИ</button>
            </div>
        </template>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" :class="{'active': tab === 1}" @click="tab = 1"><span>🏠</span>Дом</div>
        <div class="nav-item" :class="{'active': tab === 4}" @click="tab = 4"><span>📋</span>Зачет</div>
        <div class="nav-item" :class="{'active': tab === 8}" @click="tab = 8"><span>⚙️</span>Адм</div>
        <template x-if="rank !== 'Студент'"><div class="nav-item" :class="{'active': tab === 7}" @click="tab = 7"><span>🔔</span>Пер</div></template>
    </nav>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('artel', () => ({
        tab: 1,
        rank: localStorage.getItem('rank') || 'Студент',
        pass: '',
        fact: "Бритва Оккама",
        month: new Intl.DateTimeFormat('ru', {month: 'long'}).format(new Date()).toUpperCase(),
        days: Array.from({length: new Date(2026, new Date().getMonth() + 1, 0).getDate()}, (_, i) => i + 1),
        blanks: (new Date(2026, new Date().getMonth(), 1).getDay() || 7) - 1,
        activeGroup: '',
        groups_list: JSON.parse(localStorage.getItem('artel_groups') || '["57ТО", "15ТМ"]'),
        newTask: '',
        tasks_data: JSON.parse(localStorage.getItem('artel_tasks') || '{}'),
        chatMsg: '',
        chat_history: JSON.parse(localStorage.getItem('artel_chat') || '[]'),

        init() { this.activeGroup = this.groups_list[0] || ''; },
        isToday(d) { return new Date().getDate() === d; },
        login() {
            if (this.pass === '2026') this.rank = 'Мастодонт';
            else if (this.pass === '0000') this.rank = 'Админ';
            else return alert('Нет');
            localStorage.setItem('rank', this.rank);
            this.pass = ''; this.tab = 1;
        },
        logout() { this.rank = 'Студент'; localStorage.setItem('rank', 'Студент'); this.tab = 1; },
        addGroup() {
            let n = prompt("Группа:");
            if (n) { this.groups_list.push(n.toUpperCase()); this.save(); }
        },
        addTask() {
            if (!this.newTask.trim()) return;
            if (!this.tasks_data[this.activeGroup]) this.tasks_data[this.activeGroup] = [];
            this.tasks_data[this.activeGroup].unshift({id: Date.now(), text: this.newTask, time: new Date().toLocaleDateString()});
            this.newTask = ''; this.save();
        },
        removeTask(id) {
            this.tasks_data[this.activeGroup] = this.tasks_data[this.activeGroup].filter(t => t.id !== id);
            this.save();
        },
        addChatMessage() {
            if (!this.chatMsg.trim()) return;
            this.chat_history.unshift({text: this.chatMsg});
            this.chatMsg = ''; this.save();
        },
        save() {
            localStorage.setItem('artel_groups', JSON.stringify(this.groups_list));
            localStorage.setItem('artel_tasks', JSON.stringify(this.tasks_data));
            localStorage.setItem('artel_chat', JSON.stringify(this.chat_history));
        }
    }));
});
</script>
</body>
</html>
