<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АРТЕЛЬ 2026</title>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg: #f1f5f9; --paper: #ffffff; --primary: #2563eb; --text: #1e293b; --border: #cbd5e1; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; font-size: 13px; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 650px; background: var(--paper); min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }

        header { background: var(--paper); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        
        .page { display: none; padding: 10px; }
        .active { display: block !important; }
        
        .card { background: var(--paper); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
        
        .grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .span-2 { grid-column: span 2; }

        .res-btn { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: white; font-size: 0.75rem; font-weight: bold; transition: all 0.2s; }
        .res-btn:hover { background: #f8fafc; transform: translateY(-1px); }
        
        .google-form { display: flex; gap: 5px; margin-bottom: 10px; }
        .google-input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        .google-btn { background: #4285f4; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
        .google-btn:hover { opacity: 0.9; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 650px; background: white; display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); border-top: 1px solid var(--border); height: 55px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); font-weight: bold; background: #f8fafc; }

        .hero-block { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        .mini-calendar { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 8px; width: 140px; font-size: 0.6rem; }
        .cal-header { text-align: center; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; color: var(--primary); cursor: pointer; user-select: none; }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 4px; }
        .cal-nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.65rem; transition: all 0.2s; }
        .cal-nav-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .cal-day { padding: 4px 0; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
        .cal-day:hover { background: #e2e8f0; }
        .cal-today { background: var(--primary); color: white; font-weight: bold; }
        .cal-other-month { color: #cbd5e1; }
        .fact-box { background: #eff6ff; border: 1px dashed var(--primary); border-radius: 6px; padding: 6px; font-size: 0.7rem; flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-style: italic; cursor: pointer; transition: all 0.2s; }
        .fact-box:hover { background: #dbeafe; transform: scale(0.98); }
        
        .group-tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 8px; padding-bottom: 5px; }
        .group-btn { padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 6px; font-size: 0.65rem; font-weight: bold; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
        .active-group-btn { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
        
        .task-time { font-size: 0.55rem; color: #94a3b8; margin-top: 2px; }
        .delete-btn { color: #ef4444; border: none; background: none; font-size: 1.2rem; cursor: pointer; padding: 0 4px; transition: transform 0.2s; }
        .delete-btn:hover { transform: scale(1.1); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeIn 0.3s ease-out; }
        
        @media (max-width: 480px) {
            .hero-block { flex-direction: column; }
            .mini-calendar { width: 100%; }
        }
    </style>
</head>
<body x-data="artel" x-init="init()" x-cloak>

<div class="app-container">
    <header>
        <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem;">АРТЕЛЬ 2026</div>
        <div style="font-size: 0.65rem; font-weight: bold; color: #64748b;" x-text="rank"></div>
    </header>

    <!-- Главная страница -->
    <div class="page" :class="{ 'active': tab === 1 }">
        <div class="hero-block">
            <div class="fact-box" @click="refreshFact" x-text="fact">📖</div>
            <div class="mini-calendar">
                <div class="cal-nav">
                    <button class="cal-nav-btn" @click="prevMonth">◀</button>
                    <div class="cal-header" @click="resetToToday" x-text="monthYear"></div>
                    <button class="cal-nav-btn" @click="nextMonth">▶</button>
                </div>
                <div class="cal-grid">
                    <template x-for="dayName in ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']">
                        <div style="font-weight:bold; color:#94a3b8; font-size:0.6rem;" x-text="dayName"></div>
                    </template>
                    <template x-for="day in calendarDays">
                        <div class="cal-day" :class="{ 'cal-today': day.isToday, 'cal-other-month': !day.isCurrentMonth }" x-text="day.day"></div>
                    </template>
                </div>
            </div>
        </div>
        
        <form action="https://www.google.com/search" method="get" target="_blank" class="google-form">
            <input type="text" name="q" class="google-input" placeholder="Поиск в Google..." autocomplete="off">
            <button type="submit" class="google-btn">🔎</button>
        </form>

        <div class="grid-box">
            <a href="https://ogaek.by" target="_blank" class="res-btn span-2" style="background:#fffbeb; justify-content:center">🏫 ОГАЭК</a>
            <a href="https://cyberleninka.ru" target="_blank" class="res-btn">📖 Ленинка</a>
            <a href="https://scholar.google.com" target="_blank" class="res-btn">🎓 Академия</a>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <a href="https://www.drom.ru/catalog/" target="_blank" class="res-btn" style="border-left:5px solid #22c55e">🚗 АВТО / ГСМ</a>
            <a href="https://www.traktor.by/" target="_blank" class="res-btn" style="border-left:5px solid #f59e0b">🚜 ТРАКТОРЫ</a>
            <a href="https://www.agro-burse.ru/equipment/" target="_blank" class="res-btn" style="border-left:5px solid #3b82f6">⚙️ С/Х МАШИНЫ</a>
        </div>
    </div>

    <!-- Зачет (группы и задачи) -->
    <div class="page" :class="{ 'active': tab === 4 }">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
            <h3 style="margin:0">📋 Группы</h3>
            <button @click="addGroup()" x-show="canEdit" style="background:#22c55e; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:0.6rem; cursor:pointer;">+ ГРУППА</button>
        </div>
        <div class="group-tabs">
            <template x-for="g in groups_list">
                <button @click="activeGroup = g" :class="activeGroup === g ? 'active-group-btn' : 'group-btn'" x-text="g"></button>
            </template>
        </div>
        <template x-if="canEdit">
            <div class="card" style="display:flex; gap:5px; background:#f8fafc">
                <input type="text" x-model="newTask" @keydown.enter="addTask()" placeholder="Новая запись..." style="flex:1; padding:8px; border:1px solid var(--border); border-radius:6px;">
                <button @click="addTask()" class="google-btn">ДОБАВИТЬ</button>
            </div>
        </template>
        <div style="margin-top:10px">
            <template x-for="task in (tasks_data[activeGroup] || [])" :key="task.id">
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:8px;">
                    <div style="flex:1">
                        <div style="font-weight:bold" x-text="task.text"></div>
                        <div class="task-time" x-text="task.time"></div>
                    </div>
                    <button @click="removeTask(task.id)" x-show="canEdit" class="delete-btn" title="Удалить">✖</button>
                </div>
            </template>
            <div x-show="!tasks_data[activeGroup] || tasks_data[activeGroup].length === 0" class="card" style="text-align:center; color:#94a3b8;">
                Нет записей
            </div>
        </div>
    </div>

    <!-- Переменка (только для Мастодонт и Админ) -->
    <div class="page" :class="{ 'active': tab === 7 }">
        <template x-if="isMaster">
            <div>
                <h4 style="margin:0 0 10px">☕ ПЕРЕМЕНКА</h4>
                <div class="grid-box">
                    <a href="https://radiopotok.ru/belarus" target="_blank" class="res-btn">🇧🇾 Радио</a>
                    <a href="https://youtube.com" target="_blank" class="res-btn">🎬 YouTube</a>
                    <a href="https://t.me/artel_channel" target="_blank" class="res-btn">📱 Telegram</a>
                </div>
                <div class="card" style="margin-top:15px; border:2px solid var(--primary)">
                    <b>💬 КОММЕНТАРИИ:</b>
                    <div style="display:flex; gap:5px; margin:8px 0">
                        <input type="text" x-model="chatMsg" @keydown.enter="addChatMessage()" class="google-input" placeholder="Написать сообщение...">
                        <button @click="addChatMessage()" class="google-btn">📤</button>
                    </div>
                    <div style="max-height:200px; overflow-y:auto; font-size:0.7rem">
                        <template x-for="(m, idx) in chat_history" :key="idx">
                            <div style="padding:6px; border-bottom:1px solid #eee; word-break:break-word;">
                                <span style="color:#2563eb; font-weight:bold;" x-text="m.author + ': '"></span>
                                <span x-text="m.text"></span>
                                <div style="font-size:0.55rem; color:#94a3b8; margin-top:2px;" x-text="m.time"></div>
                            </div>
                        </template>
                        <div x-show="chat_history.length === 0" style="text-align:center; color:#94a3b8; padding:20px;">
                            Пока нет сообщений
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Администрирование -->
    <div class="page" :class="{ 'active': tab === 8 }">
        <template x-if="rank === 'Студент'">
            <div class="card" style="text-align:center">
                <input type="password" x-model="pass" @keydown.enter="login()" placeholder="Введите код доступа" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; text-align:center; margin-bottom:10px">
                <button @click="login()" class="google-btn" style="width:100%; padding:10px">ВОЙТИ</button>
            </div>
        </template>
        <template x-if="rank !== 'Студент'">
            <div class="card" style="text-align:center">
                <p>👤 Ваш ранг: <b x-text="rank"></b></p>
                <p>🛠️ Доступны все функции редактирования</p>
                <button @click="logout()" style="width:100%; background:#ef4444; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">ВЫЙТИ</button>
            </div>
        </template>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" :class="{'active': tab === 1}" @click="tab = 1"><span>🏠</span>Дом</div>
        <div class="nav-item" :class="{'active': tab === 4}" @click="tab = 4"><span>📋</span>Зачет</div>
        <div class="nav-item" :class="{'active': tab === 8}" @click="tab = 8"><span>⚙️</span>Адм</div>
        <template x-if="isMaster">
            <div class="nav-item" :class="{'active': tab === 7}" @click="tab = 7"><span>🔔</span>Пер</div>
        </template>
    </nav>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('artel', () => ({
        // UI состояние
        tab: 1,
        rank: localStorage.getItem('rank') || 'Студент',
        pass: '',
        
        // Календарь
        currentDate: new Date(),
        
        // Факты
        facts: [
            "📚 Знание — сила",
            "🔧 Ремонт начинается с диагностики",
            "⚡ Лучший день — сегодня",
            "🚜 Без труда не выловишь и рыбку из пруда",
            "💡 Идея стоит дороже, чем её реализация",
            "🎯 Цель без плана — просто мечта",
            "🔨 Мастерство приходит с опытом",
            "📈 Успех — это 1% вдохновения и 99% труда"
        ],
        fact: "",
        
        // Группы и задачи
        groups_list: JSON.parse(localStorage.getItem('artel_groups') || '["57ТО", "15ТМ"]'),
        activeGroup: '',
        newTask: '',
        tasks_data: JSON.parse(localStorage.getItem('artel_tasks') || '{}'),
        
        // Чат
        chatMsg: '',
        chat_history: JSON.parse(localStorage.getItem('artel_chat') || '[]'),
        
        // Computed свойства
        get canEdit() {
            return this.rank !== 'Студент';
        },
        
        get isMaster() {
            return this.rank === 'Мастодонт' || this.rank === 'Админ';
        },
        
        get monthYear() {
            return this.currentDate.toLocaleString('ru', { month: 'long', year: 'numeric' }).toUpperCase();
        },
        
        get calendarDays() {
            const year = this.currentDate.getFullYear();
            const month = this.currentDate.getMonth();
            const firstDayOfMonth = new Date(year, month, 1);
            const startDayOfWeek = firstDayOfMonth.getDay() || 7; // 1 = Пн, 7 = Вс
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Получаем дни предыдущего месяца для заполнения начала календаря
            const prevMonthDays = new Date(year, month, 0).getDate();
            const days = [];
            
            // Дни предыдущего месяца
            for (let i = startDayOfWeek - 1; i > 0; i--) {
                const day = prevMonthDays - i + 1;
                days.push({
                    day: day,
                    isCurrentMonth: false,
                    isToday: false,
                    fullDate: new Date(year, month - 1, day)
                });
            }
            
            // Дни текущего месяца
            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(year, month, i);
                const isToday = date.getDate() === today.getDate() &&
                               date.getMonth() === today.getMonth() &&
                               date.getFullYear() === today.getFullYear();
                days.push({
                    day: i,
                    isCurrentMonth: true,
                    isToday: isToday,
                    fullDate: date
                });
            }
            
            // Дни следующего месяца (чтобы заполнить сетку до 42 ячеек - 6 строк)
            const remaining = 42 - days.length;
            for (let i = 1; i <= remaining; i++) {
                days.push({
                    day: i,
                    isCurrentMonth: false,
                    isToday: false,
                    fullDate: new Date(year, month + 1, i)
                });
            }
            
            return days;
        },
        
        // Методы календаря
        prevMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
        },
        
        nextMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
        },
        
        resetToToday() {
            this.currentDate = new Date();
        },
        
        // Методы фактов
        refreshFact() {
            const randomIndex = Math.floor(Math.random() * this.facts.length);
            this.fact = this.facts[randomIndex];
        },
        
        // Инициализация
        init() {
            this.activeGroup = this.groups_list[0] || '';
            this.refreshFact();
            
            // Слушаем изменения в localStorage для синхронизации между вкладками
            window.addEventListener('storage', (e) => {
                if (e.key === 'artel_groups') {
                    this.groups_list = JSON.parse(e.newValue);
                }
                if (e.key === 'artel_tasks') {
                    this.tasks_data = JSON.parse(e.newValue);
                }
                if (e.key === 'artel_chat') {
                    this.chat_history = JSON.parse(e.newValue);
                }
                if (e.key === 'rank') {
                    this.rank = e.newValue;
                }
            });
        },
        
        // Авторизация
        login() {
            if (this.pass === '2026') {
                this.rank = 'Мастодонт';
            } else if (this.pass === '0000') {
                this.rank = 'Админ';
            } else {
                alert('Неверный код доступа');
                return;
            }
            localStorage.setItem('rank', this.rank);
            this.pass = '';
            this.tab = 1;
        },
        
        logout() {
            if (confirm('Выйти из учетной записи?')) {
                this.rank = 'Студент';
                localStorage.setItem('rank', 'Студент');
                this.tab = 1;
            }
        },
        
        // Управление группами
        addGroup() {
            let n = prompt("Введите название группы:");
            if (n && n.trim()) {
                const groupName = n.trim().toUpperCase();
                if (!this.groups_list.includes(groupName)) {
                    this.groups_list.push(groupName);
                    this.saveGroups();
                    this.activeGroup = groupName;
                } else {
                    alert('Такая группа уже существует');
                }
            }
        },
        
        // Управление задачами
        addTask() {
            if (!this.newTask.trim()) return;
            if (!this.tasks_data[this.activeGroup]) {
                this.tasks_data[this.activeGroup] = [];
            }
            this.tasks_data[this.activeGroup].unshift({
                id: Date.now(),
                text: this.newTask.trim(),
                time: new Date().toLocaleString('ru')
            });
            this.newTask = '';
            this.saveTasks();
        },
        
        removeTask(id) {
            if (confirm('Удалить эту запись?')) {
                this.tasks_data[this.activeGroup] = this.tasks_data[this.activeGroup].filter(t => t.id !== id);
                this.saveTasks();
            }
        },
        
        // Чат
        addChatMessage() {
            if (!this.chatMsg.trim()) return;
            this.chat_history.unshift({
                text: this.chatMsg.trim(),
                author: this.rank,
                time: new Date().toLocaleString('ru')
            });
            this.chatMsg = '';
            this.saveChat();
        },
        
        // Сохранение в localStorage
        saveGroups() {
            localStorage.setItem('artel_groups', JSON.stringify(this.groups_list));
        },
        
        saveTasks() {
            localStorage.setItem('artel_tasks', JSON.stringify(this.tasks_data));
        },
        
        saveChat() {
            localStorage.setItem('artel_chat', JSON.stringify(this.chat_history));
        }
    }));
});
</script>
</body>
</html>
